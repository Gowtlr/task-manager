<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Gerenciador de Tarefas</h1>
      <button id="themeToggleBtn" class="theme-toggle-btn">☀️ Modo claro</button>
    </div>

    <div class="stats">
      <div class="stat-box">
        <span>Total</span>
        <strong id="totalCount">0</strong>
      </div>

      <div class="stat-box">
        <span>Pendentes</span>
        <strong id="pendingCount">0</strong>
      </div>

      <div class="stat-box">
        <span>Concluídas</span>
        <strong id="doneCount">0</strong>
      </div>

      <div class="stat-box">
        <span>Atrasadas</span>
        <strong id="overdueCount">0</strong>
      </div>
    </div>

    <div class="search-area">
      <input type="text" id="searchInput" placeholder="Pesquisar tarefas" autocomplete="off">
      <div id="searchSuggestions" class="search-suggestions"></div>
    </div>

    <div class="input-area">
      <input type="text" id="taskTextInput" placeholder="Digite uma tarefa">

      <select id="taskPrioritySelect">
        <option value="" selected disabled>Prioridade</option>
        <option value="high">Alta</option>
        <option value="medium">Média</option>
        <option value="low">Baixa</option>
      </select>

      <input type="date" id="taskDateInput">
      <input type="time" id="taskTimeInput">
      <button id="addTaskBtn">Adicionar</button>
    </div>

    <div class="top-actions">
      <button id="clearDoneBtn">Limpar concluídas</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Todas</button>
      <button class="filter-btn" data-filter="pending">Pendentes</button>
      <button class="filter-btn" data-filter="done">Concluídas</button>
    </div>

    <p id="emptyMessage" class="empty-message">Nenhuma tarefa encontrada.</p>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
